name: CI

on:
  push:
    branches:
      - main
      - "feat/**"
      - "fix/**"
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install Python validation tools
        run: python -m pip install --upgrade pip pytest ruff mypy black

      - name: Validate public release
        run: python ./scripts/validate_public_release.py

      - name: Run tests
        run: pytest -q

      - name: Ruff
        run: ruff check .

      - name: Mypy
        run: mypy --strict $(git ls-files '*.py')

      - name: Black
        run: black --check $(git ls-files '*.py')

      - name: Dry-run npm package bundle
        run: npm pack --dry-run
