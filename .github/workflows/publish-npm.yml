name: Publish npm

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  verify-release:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Validate public release
        run: npm run validate:release

      - name: Run release smoke test
        run: npm run smoke:release

      - name: Dry-run npm package
        run: npm publish --dry-run --access public

  publish-npm:
    if: github.event_name == 'release'
    needs: verify-release
    runs-on: windows-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Publish to npm
        run: npm publish --access public
