name: Prepare release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to write into package.json and plugin.json
        required: true
        type: string
      release_notes:
        description: Optional notes to include in the release PR body
        required: false
        type: string

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Update release versions
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          version = "${{ inputs.version }}".strip()
          if not version:
              raise SystemExit("Release version input is required.")

          paths = [
              Path("package.json"),
              Path("plugins/codex-review/.codex-plugin/plugin.json"),
          ]

          for path in paths:
              payload = json.loads(path.read_text(encoding="utf-8"))
              if not isinstance(payload, dict):
                  raise SystemExit(f"Expected JSON object in {path}")
              payload["version"] = version
              path.write_text(
                  json.dumps(payload, indent=2, ensure_ascii=True) + "\n",
                  encoding="utf-8",
              )
          PY

      - name: Validate release metadata
        run: python ./scripts/validate_public_release.py

      - name: Commit and push release branch
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        shell: bash
        run: |
          branch="release/v${RELEASE_VERSION}"
          git switch -c "$branch"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json plugins/codex-review/.codex-plugin/plugin.json
          git diff --cached --quiet && exit 0
          git commit -m "Prepare release ${RELEASE_VERSION}"
          git push --force-with-lease origin "$branch"

      - name: Create or update release pull request
        env:
          GITHUB_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ inputs.version }}
          RELEASE_NOTES: ${{ inputs.release_notes }}
        shell: bash
        run: |
          branch="release/v${RELEASE_VERSION}"
          body_file="$(mktemp)"
          {
            printf "Prepare release **v%s**.\n\n" "${RELEASE_VERSION}"
            printf -- "- [x] Update \`package.json\`\n"
            printf -- "- [x] Update \`plugins/codex-review/.codex-plugin/plugin.json\`\n"
            printf -- "- [x] Run \`scripts/validate_public_release.py\`\n"
            if [ -n "${RELEASE_NOTES}" ]; then
              printf "\n## Notes\n\n%s\n" "${RELEASE_NOTES}"
            fi
            printf "\nAfter this PR is merged, create the GitHub Release for \`v%s\` to trigger npm publish.\n" "${RELEASE_VERSION}"
          } > "$body_file"

          if gh pr view "$branch" --json number >/dev/null 2>&1; then
            gh pr edit "$branch" \
              --title "Prepare release v${RELEASE_VERSION}" \
              --body-file "$body_file"
          else
            gh pr create \
              --base "${{ github.event.repository.default_branch }}" \
              --head "$branch" \
              --title "Prepare release v${RELEASE_VERSION}" \
              --body-file "$body_file"
          fi
