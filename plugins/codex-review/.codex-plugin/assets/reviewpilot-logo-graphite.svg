<svg width="560" height="180" viewBox="0 0 560 180" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="ReviewPilot graphite wordmark">
  <defs>
    <linearGradient id="reviewpilot-graphite-wordmark-shell" x1="0" y1="0" x2="560" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#27272a" />
      <stop offset="100%" stop-color="#18181b" />
    </linearGradient>
    <linearGradient id="reviewpilot-graphite-wordmark-route" x1="20" y1="75" x2="80" y2="25" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a1a1aa" stop-opacity="0.3" />
      <stop offset="40%" stop-color="#d4d4d8" />
      <stop offset="100%" stop-color="#f4f4f5" />
    </linearGradient>
    <filter id="reviewpilot-graphite-wordmark-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.8" result="blurred" />
      <feComposite in="SourceGraphic" in2="blurred" operator="over" />
    </filter>
    <clipPath id="reviewpilot-graphite-wordmark-clip">
      <rect x="4" y="4" width="92" height="92" rx="22" />
    </clipPath>
  </defs>
  <rect x="0.5" y="0.5" width="559" height="179" rx="28" fill="url(#reviewpilot-graphite-wordmark-shell)" />
  <rect x="0.5" y="0.5" width="559" height="179" rx="28" fill="none" stroke="#3f3f46" />
  <g transform="translate(34 40)">
    <rect x="4" y="4" width="92" height="92" rx="22" fill="url(#reviewpilot-graphite-wordmark-shell)" />
    <rect x="4" y="4" width="92" height="92" rx="22" fill="none" stroke="#3f3f46" stroke-width="1" />
    <g clip-path="url(#reviewpilot-graphite-wordmark-clip)">
      <line x1="50" y1="4" x2="50" y2="96" stroke="#27272a" stroke-width="0.5" />
      <line x1="4" y1="50" x2="96" y2="50" stroke="#27272a" stroke-width="0.5" />
      <circle cx="50" cy="50" r="30" fill="none" stroke="#3f3f46" stroke-width="1" />
      <text x="50" y="15" text-anchor="middle" fill="#71717a" font-size="7" font-family="system-ui" font-weight="600">N</text>
      <text x="50" y="92" text-anchor="middle" fill="#3f3f46" font-size="7" font-family="system-ui" font-weight="600">S</text>
      <text x="91" y="53" text-anchor="middle" fill="#3f3f46" font-size="7" font-family="system-ui" font-weight="600">E</text>
      <text x="9" y="53" text-anchor="middle" fill="#3f3f46" font-size="7" font-family="system-ui" font-weight="600">W</text>
      <line x1="50" y1="20" x2="50" y2="26" stroke="#71717a" stroke-width="1.5" stroke-linecap="round" />
      <line x1="50" y1="74" x2="50" y2="80" stroke="#52525b" stroke-width="1.25" stroke-linecap="round" />
      <line x1="20" y1="50" x2="26" y2="50" stroke="#52525b" stroke-width="1.25" stroke-linecap="round" />
      <line x1="74" y1="50" x2="80" y2="50" stroke="#52525b" stroke-width="1.25" stroke-linecap="round" />
      <path d="M47 22L50 16L53 22Z" fill="#d4d4d8" opacity="0.6" />
      <path d="M20 75L32 60L44 64L50 44L58 50L70 32L82 24" stroke="url(#reviewpilot-graphite-wordmark-route)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#reviewpilot-graphite-wordmark-glow)" />
      <circle cx="82" cy="24" r="3" fill="#e4e4e7" />
      <circle cx="82" cy="24" r="5.5" fill="none" stroke="#d4d4d8" stroke-width="0.75" opacity="0.35" />
    </g>
  </g>
  <g transform="translate(162 56)">
    <text x="0" y="34" fill="#f1f5f9" font-size="54" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="700" letter-spacing="-1.2">ReviewPilot</text>
    <text x="2" y="74" fill="#52525b" font-size="18" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="600" letter-spacing="5.5">AI CODE REVIEW</text>
